name: Test Extension (macOS)

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Install Fe via the standard user install flow (feup.sh)
      - name: Install Fe CLI via feup
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -fsSL https://raw.githubusercontent.com/argotorg/fe/master/feup/feup.sh | bash -s -- --no-modify-path
          echo "$HOME/.fe/bin" >> "$GITHUB_PATH"

      - name: Verify Fe installation
        run: |
          which fe
          fe --version

      - name: Install extension dependencies
        run: npm ci

      - name: Compile extension
        run: npm run compile

      - name: Pre-download VS Code for tests
        run: |
          node -e "
            const { downloadAndUnzipVSCode } = require('@vscode/test-electron');
            downloadAndUnzipVSCode().then(p => console.log('Executable:', p));
          "
          # Debug: show what was extracted
          echo "--- .vscode-test contents ---"
          find .vscode-test -maxdepth 4 -type f -name 'Electron*' -o -name 'Code*' -o -name 'code' 2>/dev/null || true
          ls -la .vscode-test/*/Visual\ Studio\ Code.app/Contents/MacOS/ 2>/dev/null || echo "MacOS dir not found"
          # Remove quarantine from the whole .app bundle
          xattr -cr .vscode-test 2>/dev/null || true

      - name: Run integration tests
        run: npm test
