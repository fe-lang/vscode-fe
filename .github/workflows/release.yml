name: Release VSIX

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npx @vscode/vsce package

      - uses: softprops/action-gh-release@v2
        with:
          files: '*.vsix'
