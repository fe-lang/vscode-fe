name: Test Extension

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # macOS / Linux: install Fe via the standard feup curl|bash flow
      - name: Install Fe CLI via feup
        if: runner.os != 'Windows'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -fsSL https://raw.githubusercontent.com/argotorg/fe/master/feup/feup.sh | bash -s -- --no-modify-path
          echo "$HOME/.fe/bin" >> "$GITHUB_PATH"

      # Windows: download the binary directly (feup.sh is bash-only)
      - name: Install Fe CLI (Windows)
        if: runner.os == 'Windows'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $feHome = "$env:USERPROFILE\.fe\bin"
          New-Item -ItemType Directory -Force -Path $feHome | Out-Null

          # Resolve latest release tag
          $headers = @{}
          if ($env:GITHUB_TOKEN) { $headers["Authorization"] = "token $env:GITHUB_TOKEN" }
          $releases = Invoke-RestMethod -Uri "https://api.github.com/repos/argotorg/fe/releases?per_page=1" -Headers $headers
          $tag = $releases[0].tag_name
          Write-Host "Installing Fe $tag"

          $url = "https://github.com/argotorg/fe/releases/download/$tag/fe_windows_amd64.exe"
          Invoke-WebRequest -Uri $url -OutFile "$feHome\fe.exe" -Headers $headers
          echo "$feHome" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Verify Fe installation
        run: fe --version

      - name: Install extension dependencies
        run: npm ci

      - name: Compile extension
        run: npm run compile

      # Linux needs a virtual display for the Electron-based VS Code
      - name: Run integration tests (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a npm test

      - name: Run integration tests
        if: runner.os != 'Linux'
        run: npm test
